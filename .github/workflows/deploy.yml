name: Build & Push Docker
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/szachmacik/ofshore-mcp:latest,ghcr.io/szachmacik/ofshore-mcp:${{ github.sha }}
      - name: Notify Coolify deploy
        run: |
          curl -s "https://coolify.ofshore.dev/api/v1/deploy?uuid=${COOLIFY_UUID}&force=true" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" || true
        env:
          COOLIFY_UUID: ${{ secrets.COOLIFY_MCP_UUID }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
